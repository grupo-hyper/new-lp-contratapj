<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContrataPJ Clone — Design Doc</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --border: #334155;
            --code-bg: #0b1220;
            --green: #10b981;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 18px;
            color: var(--text);
        }
        header .meta {
            color: var(--text-muted);
            font-size: 13px;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        h1, h2, h3, h4 {
            color: #f1f5f9;
            line-height: 1.3;
        }
        h1 {
            font-size: 36px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
            margin-top: 0;
        }
        h2 {
            font-size: 26px;
            margin-top: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        h3 { font-size: 20px; margin-top: 28px; }
        h4 { font-size: 17px; }
        a {
            color: var(--primary);
            text-decoration: none;
        }
        a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        code {
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 13px;
            color: #fbbf24;
        }
        pre {
            background: var(--code-bg);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        pre code {
            background: transparent;
            padding: 0;
            color: var(--text);
            font-size: 13px;
        }
        blockquote {
            border-left: 4px solid var(--primary);
            margin: 0;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.08);
            color: var(--text-muted);
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 10px 14px;
            text-align: left;
        }
        th {
            background: var(--surface);
            font-weight: 600;
        }
        ul, ol { padding-left: 24px; }
        li { margin: 6px 0; }
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }
        input[type="checkbox"] { margin-right: 8px; }
        .status-badge {
            display: inline-block;
            background: var(--green);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #loading {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>📄 DESIGN.md — ContrataPJ Clone</h1>
        <span class="status-badge">Draft</span>
    </header>
    <main>
        <div id="loading">Carregando design doc…</div>
        <article id="content"></article>
    </main>
    <script>
        fetch('DESIGN.md')
            .then(r => r.text())
            .then(md => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(err => {
                document.getElementById('loading').textContent = 'Erro ao carregar DESIGN.md: ' + err;
            });
    </script>
</body>
</html>
